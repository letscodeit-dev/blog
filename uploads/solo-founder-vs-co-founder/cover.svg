<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 640" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title-solo-cover">
  <title id="title-solo-cover">Solo founder juggling roles vs two co-founders building together</title>

  <rect width="1920" height="640" fill="#ffffff"/>

  <!-- top labels -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="2.4" fill="#1e1f23">
    <text x="80" y="92" font-size="18" font-weight="700" fill-opacity="0.9">FIG. 01 / STARTUPS / FOUNDING TEAM</text>
    <text x="80" y="118" font-size="13" fill-opacity="0.45" letter-spacing="1.6">one person wearing every hat, or two people splitting the load</text>
  </g>

  <g transform="translate(0 -30)">
  <!-- LEFT: solo founder scene -->
  <g>
    <rect x="80" y="160" width="780" height="420" rx="20" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.1"/>

    <!-- desk -->
    <rect x="180" y="430" width="320" height="14" rx="4" fill="#1e1f23" fill-opacity="0.12"/>
    <rect x="200" y="380" width="120" height="50" rx="6" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
    <rect x="210" y="390" width="100" height="28" rx="4" fill="#1e1f23" fill-opacity="0.08"/>
    <text x="260" y="410" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.35" text-anchor="middle">&lt;/&gt;</text>

    <!-- solo person icon (lucide user) -->
    <g transform="translate(340 400) scale(6) translate(-12 -12)" fill="none" stroke="#1e1f23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </g>

    <!-- juggling role bubbles -->
    <g>
      <g transform="translate(200 240)">
        <circle r="42" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.18" stroke-width="2"/>
        <text y="0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" fill="#1e1f23" text-anchor="middle" dominant-baseline="middle">&lt;/&gt;</text>
      </g>
      <line x1="228" y1="268" x2="300" y2="320" stroke="#1e1f23" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="4 4"/>

      <g transform="translate(480 210)">
        <circle r="42" fill="#fdfdf8" stroke="#f54e00" stroke-opacity="0.55" stroke-width="2"/>
        <text y="0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="36" font-weight="700" fill="#f54e00" text-anchor="middle" dominant-baseline="middle">?</text>
      </g>
      <line x1="450" y1="240" x2="370" y2="310" stroke="#f54e00" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 4"/>

      <g transform="translate(620 260)">
        <circle r="42" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.18" stroke-width="2"/>
        <path d="M -18 8 L 0 -12 L 18 8" fill="none" stroke="#1e1f23" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="0" y1="8" x2="0" y2="26" stroke="#1e1f23" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="-12" y1="26" x2="12" y2="26" stroke="#1e1f23" stroke-width="2.2" stroke-linecap="round"/>
      </g>
      <line x1="590" y1="290" x2="360" y2="330" stroke="#1e1f23" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="4 4"/>

      <g transform="translate(260 340)">
        <circle r="38" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.18" stroke-width="2"/>
        <path d="M -16 8 L 0 -10 L 16 8" fill="none" stroke="#1e1f23" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="0" y1="8" x2="0" y2="24" stroke="#1e1f23" stroke-width="2" stroke-linecap="round"/>
        <line x1="-12" y1="24" x2="12" y2="24" stroke="#1e1f23" stroke-width="2" stroke-linecap="round"/>
      </g>
      <line x1="290" y1="360" x2="320" y2="370" stroke="#1e1f23" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="4 4"/>

      <g transform="translate(560 340)">
        <circle r="38" fill="#1e1f23"/>
        <text y="0" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="32" font-weight="700" fill="#fdfdf8" text-anchor="middle" dominant-baseline="middle">$</text>
      </g>
      <line x1="530" y1="360" x2="360" y2="370" stroke="#1e1f23" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="4 4"/>
    </g>

    <!-- stacked hats metaphor -->
    <g transform="translate(340 300)">
      <ellipse cx="0" cy="0" rx="34" ry="10" fill="#1e1f23" fill-opacity="0.15"/>
      <path d="M -26 -4 Q 0 -18 26 -4 L 22 8 Q 0 -2 -22 8 Z" fill="#bfc1b7" stroke="#1e1f23" stroke-opacity="0.25" stroke-width="1.5"/>
      <path d="M -22 -14 Q 0 -28 22 -14 L 18 -2 Q 0 -12 -18 -2 Z" fill="#8a8d86" stroke="#1e1f23" stroke-opacity="0.25" stroke-width="1.5"/>
      <path d="M -18 -24 Q 0 -38 18 -24 L 14 -12 Q 0 -22 -14 -12 Z" fill="#f54e00" stroke="#1e1f23" stroke-opacity="0.2" stroke-width="1.5"/>
    </g>

    <text x="120" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="1.4" fill="#1e1f23" fill-opacity="0.55">SOLO</text>
    <text x="120" y="552" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8a8d86">every role lands on one person</text>
  </g>

  <!-- CENTER: vs -->
  <g>
    <circle cx="960" cy="340" r="52" fill="#fdfdf8" stroke="#f54e00" stroke-width="3"/>
    <text x="960" y="340" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="700" fill="#f54e00" text-anchor="middle" dominant-baseline="middle">vs</text>
  </g>

  <!-- RIGHT: co-founder scene -->
  <g>
    <rect x="1060" y="160" width="780" height="420" rx="20" fill="#eeefe9" stroke="#f54e00" stroke-opacity="0.22"/>

    <!-- shared desk -->
    <rect x="1180" y="430" width="540" height="14" rx="4" fill="#1e1f23" fill-opacity="0.12"/>
    <rect x="1320" y="370" width="280" height="60" rx="8" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
    <rect x="1336" y="382" width="248" height="36" rx="4" fill="#1e1f23" fill-opacity="0.06"/>
    <rect x="1350" y="392" width="80" height="8" rx="2" fill="#f54e00" fill-opacity="0.7"/>
    <rect x="1350" y="406" width="120" height="6" rx="2" fill="#1e1f23" fill-opacity="0.15"/>
    <rect x="1350" y="418" width="60" height="6" rx="2" fill="#1e1f23" fill-opacity="0.1"/>

    <!-- whiteboard -->
    <rect x="1680" y="220" width="120" height="100" rx="8" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
    <line x1="1700" y1="250" x2="1780" y2="250" stroke="#1e1f23" stroke-opacity="0.12" stroke-width="3" stroke-linecap="round"/>
    <line x1="1700" y1="270" x2="1760" y2="270" stroke="#f54e00" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1720" cy="295" r="8" fill="none" stroke="#1e1f23" stroke-opacity="0.2" stroke-width="2"/>
    <path d="M 1748 295 L 1768 295" stroke="#1e1f23" stroke-opacity="0.2" stroke-width="2" stroke-linecap="round"/>

    <!-- partners icon (lucide users) -->
    <g transform="translate(1460 400) scale(6) translate(-12 -12)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#1e1f23" stroke-width="2">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
      </g>
      <g stroke="#f54e00" stroke-width="2">
        <path d="M16 3.128a4 4 0 0 1 0 7.744"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
      </g>
    </g>

    <!-- speech / trust bubbles -->
    <ellipse cx="1220" cy="280" rx="36" ry="24" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
    <line x1="1208" y1="280" x2="1232" y2="280" stroke="#1e1f23" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round"/>
    <line x1="1208" y1="290" x2="1224" y2="290" stroke="#1e1f23" stroke-opacity="0.15" stroke-width="2" stroke-linecap="round"/>

    <ellipse cx="1700" cy="280" rx="36" ry="24" fill="#fdfdf8" stroke="#f54e00" stroke-opacity="0.35"/>
    <path d="M 1688 274 L 1698 284 L 1716 268" fill="none" stroke="#f54e00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- split role chips -->
    <rect x="1120" y="320" width="72" height="32" rx="8" fill="#1e1f23"/>
    <text x="1156" y="342" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#fdfdf8" text-anchor="middle">build</text>
    <rect x="1720" y="320" width="72" height="32" rx="8" fill="#f54e00"/>
    <text x="1756" y="342" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#fdfdf8" text-anchor="middle">sell</text>

    <text x="1100" y="200" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="1.4" fill="#f54e00">CO-FOUNDERS</text>
    <text x="1100" y="552" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#8a8d86">skills split, decisions shared</text>
  </g>
  </g>

  <!-- bottom -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.6" fill="#1e1f23">
    <text x="80" y="594" font-size="13" font-weight="700" fill-opacity="0.7">SOLO / PARTNER / SKILLS MAP / RUNWAY</text>
    <text x="1840" y="594" font-size="13" text-anchor="end" fill-opacity="0.4">letscodeit.dev</text>
  </g>
</svg>
