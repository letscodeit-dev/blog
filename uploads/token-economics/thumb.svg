    <text x="34" y="32" fill="#fdfdf8" text-anchor="middle">tok</text>
    <rect x="56" y="20" width="36" height="18" rx="4" fill="#1e1f23"/>
    <text x="74" y="32" fill="#fdfdf8" text-anchor="middle">en</text>
    <rect x="96" y="20" width="28" height="18" rx="4" fill="#f54e00"/>
    <text x="110" y="32" fill="#fdfdf8" text-anchor="middle">49</text>
  </g>

