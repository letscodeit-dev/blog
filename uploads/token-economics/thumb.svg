  <g>
    <line x1="40" y1="168" x2="320" y2="168" stroke="#1e1f23" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- EN 49 -->
    <rect x="48"  y="148" width="28" height="20" rx="4" fill="#1e1f23"/>
    <text x="62" y="142" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" font-weight="700" fill="#1e1f23" text-anchor="middle">49</text>
    <text x="62" y="186" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="700" fill="#1e1f23" text-anchor="middle">EN</text>

    <!-- RU 74 -->
    <rect x="92"  y="136" width="28" height="32" rx="4" fill="#bfc1b7"/>
    <text x="106" y="130" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" font-weight="700" fill="#1e1f23" text-anchor="middle">74</text>
    <text x="106" y="186" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="700" fill="#1e1f23" text-anchor="middle">RU</text>

    <!-- ZH 62 -->
    <rect x="136" y="140" width="28" height="28" rx="4" fill="#bfc1b7"/>
    <text x="150" y="134" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" font-weight="700" fill="#1e1f23" text-anchor="middle">62</text>
    <text x="150" y="186" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="700" fill="#1e1f23" text-anchor="middle">ZH</text>

    <!-- JA 95 -->
    <rect x="180" y="120" width="28" height="48" rx="4" fill="#8a8d86"/>
    <text x="194" y="114" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" font-weight="700" fill="#1e1f23" text-anchor="middle">95</text>
    <text x="194" y="186" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="9" font-weight="700" fill="#1e1f23" text-anchor="middle">JA</text>

    <!-- AM 318 -->
    <rect x="224" y="52" width="28" height="116" rx="4" fill="#f54e00"/>
