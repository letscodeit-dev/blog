<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 352 244" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title-token-economics-thumb">
  <title id="title-token-economics-thumb">Token Economics — tokens by language thumbnail</title>
  <rect width="352" height="244" fill="#ffffff"/>

  <g stroke="#1e1f23" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="61" x2="352" y2="61"/>
    <line x1="0" y1="122" x2="352" y2="122"/>
    <line x1="0" y1="183" x2="352" y2="183"/>
  </g>

  <!-- Mini token blocks -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="8" font-weight="700">
