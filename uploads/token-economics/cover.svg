<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 640" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title-token-economics-cover">
  <title id="title-token-economics-cover">Token Economics — what your text actually costs</title>
  <defs>
    <marker id="arrow-token" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1e1f23" fill-opacity="0.7"/>
    </marker>
  </defs>
  <rect width="1920" height="640" fill="#ffffff"/>

  <!-- grid -->
  <g stroke="#1e1f23" stroke-opacity="0.08" stroke-width="1.2">
    <line x1="0" y1="128" x2="1920" y2="128"/>
    <line x1="0" y1="256" x2="1920" y2="256"/>
    <line x1="0" y1="384" x2="1920" y2="384"/>
    <line x1="0" y1="512" x2="1920" y2="512"/>
  </g>

  <!-- Left: text → token chunks -->
  <g>
    <rect x="120" y="168" width="520" height="360" rx="16" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.12"/>
    <text x="148" y="208" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" letter-spacing="1.6" fill="#1e1f23" fill-opacity="0.85">INPUT TEXT</text>
    <text x="148" y="252" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" fill="#1e1f23" fill-opacity="0.7">"Many words map to one token…"</text>

    <path d="M 380 300 L 420 300" stroke="#1e1f23" stroke-opacity="0.45" stroke-width="2" fill="none" marker-end="url(#arrow-token)"/>

    <text x="148" y="308" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="1.4" fill="#1e1f23" fill-opacity="0.55">BPE TOKENIZER</text>

    <!-- token blocks (EN — compact) -->
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700">
      <rect x="148" y="332" width="72" height="36" rx="8" fill="#1e1f23"/>
      <text x="184" y="356" fill="#fdfdf8" text-anchor="middle">Many</text>
      <rect x="228" y="332" width="56" height="36" rx="8" fill="#1e1f23"/>
      <text x="256" y="356" fill="#fdfdf8" text-anchor="middle">words</text>
      <rect x="292" y="332" width="48" height="36" rx="8" fill="#1e1f23"/>
      <text x="316" y="356" fill="#fdfdf8" text-anchor="middle">map</text>
      <rect x="348" y="332" width="40" height="36" rx="8" fill="#f54e00"/>
      <text x="368" y="356" fill="#fdfdf8" text-anchor="middle">to</text>
      <rect x="396" y="332" width="52" height="36" rx="8" fill="#1e1f23"/>
      <text x="422" y="356" fill="#fdfdf8" text-anchor="middle">one</text>
      <rect x="456" y="332" width="64" height="36" rx="8" fill="#1e1f23"/>
      <text x="488" y="356" fill="#fdfdf8" text-anchor="middle">token</text>
    </g>

    <!-- AM — fragmented -->
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" font-weight="700">
      <text x="148" y="400" font-size="12" fill="#1e1f23" fill-opacity="0.5" letter-spacing="1.2">AMHARIC (same meaning):</text>
      <rect x="148" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="180" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="212" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="244" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="276" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="308" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="340" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="372" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="404" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="436" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <rect x="468" y="412" width="28" height="24" rx="4" fill="#1e1f23" fill-opacity="0.75"/>
      <text x="148" y="462" font-size="11" fill="#1e1f23" fill-opacity="0.45">…318 tokens (o200k)</text>
    </g>

    <text x="148" y="500" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" font-weight="700" fill="#1e1f23">
      <tspan>EN: </tspan><tspan font-weight="700">49 tok</tspan>
      <tspan dx="24" fill-opacity="0.35">vs</tspan>
      <tspan dx="24" fill="#f54e00">AM: 318 tok</tspan>
    </text>
  </g>

  <!-- Right: bar chart -->
  <g>
    <rect x="720" y="148" width="1080" height="400" rx="16" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.12"/>
    <text x="760" y="196" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" letter-spacing="1.6" fill="#1e1f23" fill-opacity="0.85">TOKENS (o200k_base) · SAME TEXT</text>

    <line x1="860" y1="468" x2="1740" y2="468" stroke="#1e1f23" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="6 6"/>
    <text x="760" y="472" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.45">EN baseline (49)</text>

    <!-- EN 49 -->
    <rect x="880"  y="425" width="88" height="43"  rx="8" fill="#1e1f23"/>
    <text x="924" y="415" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">49</text>
    <text x="924" y="508" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle">EN</text>

    <!-- ES 63 -->
    <rect x="1012" y="413" width="88" height="55"  rx="8" fill="#bfc1b7"/>
    <text x="1056" y="403" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">63</text>
    <text x="1056" y="508" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle">ES</text>

    <!-- RU 74 -->
    <rect x="1144" y="403" width="88" height="65"  rx="8" fill="#bfc1b7"/>
    <text x="1188" y="393" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">74</text>
    <text x="1188" y="508" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle">RU</text>

    <!-- ZH 62 -->
    <rect x="1276" y="414" width="88" height="54"  rx="8" fill="#bfc1b7"/>
    <text x="1320" y="404" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">62</text>
    <text x="1320" y="508" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle">ZH</text>

    <!-- JA 95 -->
    <rect x="1408" y="384" width="88" height="84"  rx="8" fill="#8a8d86"/>
    <text x="1452" y="374" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">95</text>
    <text x="1452" y="508" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle">JA</text>

    <!-- AM 318 -->
    <rect x="1540" y="188" width="88" height="280" rx="8" fill="#f54e00"/>
    <text x="1584" y="178" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#f54e00" text-anchor="middle">318</text>
    <text x="1584" y="508" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle">AM</text>
    <text x="1584" y="528" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#f54e00" fill-opacity="0.8" text-anchor="middle">+549%</text>

    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.35" text-anchor="end">
      <text x="848" y="472">0</text>
      <text x="848" y="392">150</text>
      <text x="848" y="312">300</text>
    </g>
    <line x1="860" y1="468" x2="860" y2="228" stroke="#1e1f23" stroke-opacity="0.12" stroke-width="1"/>
  </g>

  <!-- Top / bottom labels -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="2.4" fill="#1e1f23">
    <text x="120" y="92" font-size="18" font-weight="700" fill-opacity="0.9">FIG. 01 · AI FOUNDATIONS / TOKEN ECONOMICS</text>
    <text x="120" y="118" font-size="13" fill-opacity="0.45" letter-spacing="1.6">same text, different languages — you pay per token, not per word</text>
  </g>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.6" fill="#1e1f23">
    <text x="120"  y="600" font-size="13" font-weight="700" fill-opacity="0.7">LANGUAGE · TOKENIZER · COST · o200k_base</text>
    <text x="1800" y="600" font-size="13" text-anchor="end" fill-opacity="0.4">letscodeit.dev</text>
  </g>
</svg>
