<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 640" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title-replace-cover">
  <title id="title-replace-cover">Why AI won't replace developers — augment, not replace</title>
  <defs>
    <linearGradient id="grad-replace-cover-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1f23"/>
      <stop offset="100%" stop-color="#4a4d56"/>
    </linearGradient>
    <linearGradient id="grad-replace-cover-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2d28"/>
      <stop offset="100%" stop-color="#4a4d56"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="640" fill="url(#grad-replace-cover-light)" class="svg-light-only"/>
  <rect width="1920" height="640" fill="url(#grad-replace-cover-dark)"  class="svg-dark-only"/>

  <!-- soft grid -->
  <g stroke="#fdfdf8" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="160" x2="1920" y2="160"/>
    <line x1="0" y1="320" x2="1920" y2="320"/>
    <line x1="0" y1="480" x2="1920" y2="480"/>
  </g>

  <!-- Terminal (left) -->
  <g>
    <rect x="120" y="160" width="640" height="380" rx="14" fill="#0d0e10"/>
    <circle cx="148" cy="188" r="6" fill="#f54e00"/>
    <circle cx="170" cy="188" r="6" fill="#bfc1b7"/>
    <circle cx="192" cy="188" r="6" fill="#4a4d56"/>
    <text x="600" y="192" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11"
          fill="#bfc1b7" fill-opacity="0.55" text-anchor="end" letter-spacing="1.2">~/project/llm-feature</text>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="18" letter-spacing="0.4">
      <text x="148" y="240" fill="#bfc1b7">$ git diff feature/llm</text>
      <text x="148" y="272" fill="#bfc1b7">$ claude review src/</text>
      <text x="148" y="304" fill="#f54e00">  → 3 suggestions, 0 blockers</text>
      <text x="148" y="336" fill="#bfc1b7">$ git commit -m "ship"</text>
      <text x="148" y="368" fill="#bfc1b7">  [main 4f2a9c] ship</text>
      <text x="148" y="400" fill="#bfc1b7">$ git push origin main</text>
      <text x="148" y="432" fill="#22c55e">✓ deployed (with ai)</text>
      <text x="148" y="464" fill="#bfc1b7">$ <tspan fill="#fdfdf8">▌</tspan></text>
    </g>
  </g>

  <!-- Plus operator (center) -->
  <g>
    <line x1="780"  y1="320" x2="900"  y2="320" stroke="#fdfdf8" stroke-opacity="0.35" stroke-width="1.5"/>
    <line x1="1020" y1="320" x2="1140" y2="320" stroke="#fdfdf8" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="960" cy="320" r="90" fill="#f54e00"/>
    <!-- + symbol -->
    <rect x="918" y="314" width="84" height="12" rx="6" fill="#fdfdf8"/>
    <rect x="954" y="278" width="12" height="84" rx="6" fill="#fdfdf8"/>
    <!-- orbiting nodes -->
    <g fill="#fdfdf8">
      <circle cx="888" cy="220" r="7"/>
      <circle cx="1032" cy="220" r="7"/>
      <circle cx="880" cy="396" r="6"/>
      <circle cx="1040" cy="396" r="6"/>
      <circle cx="960" cy="190" r="5"/>
      <circle cx="960" cy="450" r="5"/>
    </g>
    <g stroke="#fdfdf8" stroke-opacity="0.35" stroke-width="1">
      <line x1="960" y1="320" x2="888"  y2="220"/>
      <line x1="960" y1="320" x2="1032" y2="220"/>
      <line x1="960" y1="320" x2="880"  y2="396"/>
      <line x1="960" y1="320" x2="1040" y2="396"/>
      <line x1="960" y1="320" x2="960"  y2="190"/>
      <line x1="960" y1="320" x2="960"  y2="450"/>
    </g>
  </g>

  <!-- Developer silhouette (right) -->
  <g>
    <!-- head -->
    <circle cx="1480" cy="240" r="60" fill="#bfc1b7"/>
    <!-- shoulders -->
    <rect x="1340" y="316" width="280" height="200" rx="40" fill="#bfc1b7"/>
    <!-- inner highlight (neural overlay) -->
    <g stroke="#1e1f23" stroke-opacity="0.4" stroke-width="1">
      <circle cx="1460" cy="232" r="3" fill="#1e1f23"/>
      <circle cx="1500" cy="232" r="3" fill="#1e1f23"/>
      <path d="M 1450 268 Q 1480 282 1510 268" fill="none"/>
    </g>
    <!-- label -->
    <text x="1480" y="560" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14"
          font-weight="700" letter-spacing="2.2" fill="#fdfdf8" fill-opacity="0.85" text-anchor="middle">THE DEVELOPER</text>
  </g>

  <!-- Top label -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="2.4" fill="#fdfdf8">
    <text x="120" y="92" font-size="18" font-weight="700" fill-opacity="0.95">FIG. 01 · INDUSTRY / FUTURE OF WORK</text>
    <text x="120" y="118" font-size="13" fill-opacity="0.65" letter-spacing="1.6">why ai won't replace developers — it makes them more dangerous</text>
  </g>

  <!-- Bottom captions -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.6" fill="#fdfdf8">
    <text x="120"  y="600" font-size="13" font-weight="700" fill-opacity="0.85">AUGMENT · NOT REPLACE · v2024.11</text>
    <text x="1800" y="600" font-size="13" text-anchor="end" fill-opacity="0.70">letscodeit.dev</text>
  </g>
</svg>
