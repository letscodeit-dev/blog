<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" role="img" aria-labelledby="title-sub">
  <title id="title-sub">Subagents: manager delegates and merges results</title>
  <defs>
    <marker id="arr-s" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f54e00"/>
    </marker>
  </defs>
  <rect width="960" height="340" rx="12" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.1"/>
  <text x="480" y="32" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">SUBAGENTS: ONE MANAGER, THREE WORKERS</text>
  <g font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="12">
    <rect x="330" y="52" width="300" height="72" rx="10" fill="#f54e00"/>
    <text x="480" y="82" fill="#fdfdf8" text-anchor="middle">Agent-manager</text>
    <text x="480" y="104" font-size="11" font-weight="400" fill="#fdfdf8" fill-opacity="0.95" text-anchor="middle">task: research competitors + report</text>
    <rect x="80" y="160" width="220" height="72" rx="10" fill="#1e1f23"/>
    <text x="190" y="192" fill="#fdfdf8" text-anchor="middle">Searcher</text>
    <text x="190" y="212" font-size="10" font-weight="400" fill="#fdfdf8" fill-opacity="0.7" text-anchor="middle">web</text>
    <rect x="370" y="160" width="220" height="72" rx="10" fill="#1e1f23"/>
    <text x="480" y="192" fill="#fdfdf8" text-anchor="middle">Analyst</text>
    <text x="480" y="212" font-size="10" font-weight="400" fill="#fdfdf8" fill-opacity="0.7" text-anchor="middle">compare</text>
    <rect x="660" y="160" width="220" height="72" rx="10" fill="#1e1f23"/>
    <text x="770" y="192" fill="#fdfdf8" text-anchor="middle">Writer</text>
    <text x="770" y="212" font-size="10" font-weight="400" fill="#fdfdf8" fill-opacity="0.7" text-anchor="middle">report.md</text>
    <rect x="330" y="268" width="300" height="48" rx="10" fill="#fdfdf8" stroke="#f54e00" stroke-width="2"/>
    <text x="480" y="298" fill="#1e1f23" text-anchor="middle">Final report to you</text>
  </g>
  <g stroke="#f54e00" stroke-width="2" fill="none" marker-end="url(#arr-s)">
    <line x1="420" y1="124" x2="190" y2="160"/>
    <line x1="480" y1="124" x2="480" y2="160"/>
    <line x1="540" y1="124" x2="770" y2="160"/>
    <line x1="190" y1="232" x2="400" y2="268"/>
    <line x1="480" y1="232" x2="480" y2="268"/>
    <line x1="770" y1="232" x2="560" y2="268"/>
  </g>
  <text x="480" y="328" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.7" text-anchor="middle">Parallel work, clean context per role</text>
</svg>
