<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="title-layers">
  <title id="title-layers">One ChatGPT window, four parts behind the scenes</title>
  <defs>
    <marker id="arr-l" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f54e00"/>
    </marker>
  </defs>
  <rect width="960" height="220" rx="12" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.1"/>
  <text x="480" y="28" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">YOU SEE ONE WINDOW - INSIDE THERE ARE LAYERS</text>
  <g font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="12">
    <rect x="24" y="52" width="120" height="120" rx="10" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.2"/>
    <text x="84" y="88" fill="#1e1f23" text-anchor="middle">1. You</text>
    <text x="84" y="108" font-size="10" font-weight="400" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">prompt</text>
    <rect x="184" y="52" width="140" height="120" rx="10" fill="#fdfdf8" stroke="#f54e00" stroke-width="2"/>
    <text x="254" y="88" fill="#1e1f23" text-anchor="middle">2. Product</text>
    <text x="254" y="108" font-size="10" font-weight="400" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">ChatGPT wrap</text>
    <rect x="364" y="52" width="140" height="120" rx="10" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.2"/>
    <text x="434" y="88" fill="#f54e00" text-anchor="middle">3. Tool</text>
    <text x="434" y="108" font-size="10" font-weight="400" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">web search</text>
    <rect x="544" y="52" width="140" height="120" rx="10" fill="#1e1f23"/>
    <text x="614" y="88" fill="#fdfdf8" text-anchor="middle">4. Model</text>
    <text x="614" y="108" font-size="10" font-weight="400" fill="#fdfdf8" fill-opacity="0.7" text-anchor="middle">GPT-4o</text>
    <rect x="724" y="52" width="212" height="120" rx="10" fill="#f54e00" fill-opacity="0.15" stroke="#f54e00"/>
    <text x="830" y="88" fill="#1e1f23" text-anchor="middle">5. Answer</text>
    <text x="830" y="108" font-size="10" font-weight="400" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">text in chat</text>
  </g>
  <g stroke="#f54e00" stroke-width="2" fill="none" marker-end="url(#arr-l)">
    <line x1="144" y1="112" x2="184" y2="112"/>
    <line x1="324" y1="112" x2="364" y2="112"/>
    <line x1="504" y1="112" x2="544" y2="112"/>
    <line x1="684" y1="112" x2="724" y2="112"/>
  </g>
  <text x="480" y="198" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.55" text-anchor="middle">Feels like ChatGPT did it alone - model is only step 4</text>
</svg>
