<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 640" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title-github-cms-cover">
  <title id="title-github-cms-cover">GitHub as a CMS - markdown repo, CDN, Next.js reader</title>
  <defs>
    <marker id="arrow-cms" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1e1f23" fill-opacity="0.7"/>
    </marker>
    <marker id="arrow-cms-accent" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f54e00"/>
    </marker>
  </defs>
  <rect width="1920" height="640" fill="#ffffff"/>

  <g stroke="#1e1f23" stroke-opacity="0.08" stroke-width="1.2">
    <line x1="0" y1="128" x2="1920" y2="128"/>
    <line x1="0" y1="256" x2="1920" y2="256"/>
    <line x1="0" y1="384" x2="1920" y2="384"/>
    <line x1="0" y1="512" x2="1920" y2="512"/>
  </g>

  <g>
    <rect x="80" y="148" width="520" height="400" rx="16" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.12"/>
    <text x="108" y="188" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" letter-spacing="1.6" fill="#1e1f23" fill-opacity="0.85">GITHUB / blog repo</text>
    <rect x="108" y="208" width="464" height="40" rx="8" fill="#1e1f23"/>
    <text x="124" y="234" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#fdfdf8">letscodeit-dev/blog</text>
    <text x="108" y="276" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" letter-spacing="1.2" fill="#1e1f23" fill-opacity="0.5">posts/</text>
    <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23" fill-opacity="0.7">
      <rect x="108" y="288" width="464" height="32" rx="6" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.08"/>
      <text x="124" y="310">token-economics.md</text>
      <rect x="108" y="328" width="464" height="32" rx="6" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.08"/>
      <text x="124" y="350">geo-generative-engine-optimization.md</text>
      <rect x="108" y="368" width="464" height="32" rx="6" fill="#f54e00" fill-opacity="0.12" stroke="#f54e00" stroke-opacity="0.45"/>
      <text x="124" y="390" fill="#f54e00" font-weight="700">github-as-cms-markdown-nextjs.md</text>
    </g>
    <text x="108" y="428" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" letter-spacing="1.2" fill="#1e1f23" fill-opacity="0.5">uploads/</text>
    <rect x="108" y="440" width="200" height="28" rx="6" fill="#1e1f23" fill-opacity="0.08"/>
    <text x="124" y="459" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.55">cover.svg + thumb.svg</text>
    <text x="108" y="508" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.45">git push = source of truth</text>
  </g>

  <path d="M 620 348 L 680 348" stroke="#1e1f23" stroke-opacity="0.45" stroke-width="2.5" fill="none" marker-end="url(#arrow-cms)"/>

  <g>
    <rect x="700" y="148" width="520" height="400" rx="16" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.12"/>
    <text x="728" y="188" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" letter-spacing="1.6" fill="#1e1f23" fill-opacity="0.85">CLOUDFLARE PAGES / CDN</text>
    <rect x="728" y="212" width="464" height="56" rx="10" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.12"/>
    <text x="744" y="246" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16" font-weight="700" fill="#f54e00">cdn.letscodeit.dev</text>
    <rect x="1080" y="222" width="96" height="36" rx="8" fill="#f54e00"/>
    <text x="1128" y="245" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#fdfdf8" text-anchor="middle">$0</text>
