<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title-history-before-after">
  <title id="title-history-before-after">Git commit graph before and after orphan branch reset</title>
  <rect width="960" height="560" rx="12" fill="#ffffff" stroke="#1e1f23" stroke-opacity="0.1"/>
  <text x="240" y="44" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle">BEFORE</text>
  <text x="720" y="44" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#f54e00" text-anchor="middle">AFTER</text>

  <line x1="480" y1="64" x2="480" y2="520" stroke="#1e1f23" stroke-opacity="0.1" stroke-width="2" stroke-dasharray="6 6"/>

  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <rect x="48" y="80" width="384" height="420" rx="12" fill="#eeefe9" fill-opacity="0.5" stroke="#1e1f23" stroke-opacity="0.1"/>
    <text x="72" y="108" font-size="10" font-weight="700" fill="#1e1f23" fill-opacity="0.45">main - 65 commits</text>
    <g fill="#1e1f23" fill-opacity="0.5">
      <circle cx="100" cy="150" r="8"/><circle cx="140" cy="180" r="8"/><circle cx="180" cy="210" r="8"/>
      <circle cx="220" cy="240" r="8"/><circle cx="260" cy="270" r="8"/><circle cx="300" cy="300" r="8"/>
      <circle cx="340" cy="330" r="8"/><circle cx="360" cy="360" r="8"/>
      <line x1="108" y1="154" x2="132" y2="174" stroke="#1e1f23" stroke-opacity="0.3"/>
      <line x1="148" y1="184" x2="172" y2="204" stroke="#1e1f23" stroke-opacity="0.3"/>
      <line x1="188" y1="214" x2="212" y2="234" stroke="#1e1f23" stroke-opacity="0.3"/>
      <line x1="228" y1="244" x2="252" y2="264" stroke="#1e1f23" stroke-opacity="0.3"/>
      <line x1="268" y1="274" x2="292" y2="294" stroke="#1e1f23" stroke-opacity="0.3"/>
      <line x1="308" y1="304" x2="332" y2="324" stroke="#1e1f23" stroke-opacity="0.3"/>
      <line x1="348" y1="334" x2="352" y2="352" stroke="#1e1f23" stroke-opacity="0.3"/>
    </g>
    <rect x="72" y="390" width="160" height="28" rx="6" fill="#f54e00" fill-opacity="0.15" stroke="#f54e00" stroke-opacity="0.4"/>
    <text x="84" y="409" font-size="9" font-weight="700" fill="#f54e00">AGENTS.md in history</text>
    <rect x="72" y="426" width="120" height="24" rx="6" fill="#f54e00" fill-opacity="0.1" stroke="#f54e00" stroke-opacity="0.3"/>
    <text x="84" y="442" font-size="9" fill="#f54e00">.ai/ .cursor/</text>
    <text x="72" y="478" font-size="9" fill="#1e1f23" fill-opacity="0.4">git show old-sha:file still works</text>

    <rect x="528" y="80" width="384" height="420" rx="12" fill="#fdfdf8" stroke="#f54e00" stroke-opacity="0.35"/>
    <text x="552" y="108" font-size="10" font-weight="700" fill="#f54e00">main - 1 commit</text>
    <circle cx="720" cy="280" r="40" fill="#f54e00" fill-opacity="0.12" stroke="#f54e00" stroke-width="2"/>
    <text x="720" y="276" font-size="11" font-weight="700" fill="#f54e00" text-anchor="middle">root</text>
    <text x="720" y="294" font-size="9" fill="#f54e00" text-anchor="middle">07b80c3</text>
    <text x="552" y="360" font-size="10" fill="#1e1f23" fill-opacity="0.6">57 files</text>
    <text x="552" y="380" font-size="10" fill="#1e1f23" fill-opacity="0.6">posts/ + uploads/</text>
    <text x="552" y="400" font-size="10" fill="#1e1f23" fill-opacity="0.6">README + .gitignore</text>
    <text x="552" y="440" font-size="9" fill="#1e1f23" fill-opacity="0.4">CDN paths unchanged</text>
    <text x="552" y="460" font-size="9" fill="#1e1f23" fill-opacity="0.4">Next.js fetch by path OK</text>
  </g>

  <text x="480" y="530" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.45" text-anchor="middle">orphan branch + git push --force origin fresh-history:main</text>
</svg>
