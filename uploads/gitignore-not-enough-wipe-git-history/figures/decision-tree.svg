<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title-decision-tree">
  <title id="title-decision-tree">Decision tree for git history cleanup on a public repo</title>
  <defs>
    <marker id="arrow-dt-grey" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1e1f23" fill-opacity="0.45"/>
    </marker>
    <marker id="arrow-dt-orange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f54e00" fill-opacity="0.85"/>
    </marker>
  </defs>
  <rect width="960" height="560" rx="12" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.1"/>
  <text x="480" y="40" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle" letter-spacing="1">REMOVE FILES FROM PUBLIC GIT HISTORY?</text>

  <rect x="320" y="72" width="320" height="48" rx="10" fill="#1e1f23" fill-opacity="0.08" stroke="#1e1f23" stroke-opacity="0.15"/>
  <text x="480" y="102" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#1e1f23" text-anchor="middle">Committed secrets?</text>

  <line x1="480" y1="120" x2="480" y2="148" stroke="#1e1f23" stroke-opacity="0.3" stroke-width="2"/>
  <text x="500" y="140" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#f54e00">YES - rotate keys first</text>

  <rect x="280" y="156" width="400" height="44" rx="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.12"/>
  <text x="480" y="184" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" text-anchor="middle">Must keep commit graph / SHAs?</text>

  <line x1="360" y1="200" x2="200" y2="248" stroke="#1e1f23" stroke-opacity="0.3" stroke-width="2" marker-end="url(#arrow-dt-grey)"/>

  <line x1="600" y1="200" x2="760" y2="248" stroke="#f54e00" stroke-opacity="0.6" stroke-width="2" marker-end="url(#arrow-dt-orange)"/>

  <rect x="48" y="256" width="304" height="120" rx="12" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
  <text x="200" y="288" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#1e1f23" text-anchor="middle">git filter-repo</text>
  <text x="200" y="312" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">Strip paths from every commit</text>
  <text x="200" y="332" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">Team + audit trail</text>
  <text x="200" y="356" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.45" text-anchor="middle">force push all branches</text>

  <rect x="608" y="256" width="304" height="120" rx="12" fill="#fdfdf8" stroke="#f54e00" stroke-width="2"/>
  <text x="760" y="288" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" fill="#f54e00" text-anchor="middle">orphan branch</text>
  <text x="760" y="312" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">One new root commit</text>
  <text x="760" y="332" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">Solo + small repo</text>
  <text x="760" y="356" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.45" text-anchor="middle">what we used</text>

  <rect x="160" y="420" width="640" height="100" rx="12" fill="#1e1f23" fill-opacity="0.06" stroke="#1e1f23" stroke-opacity="0.12"/>
  <text x="480" y="452" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#1e1f23" text-anchor="middle">ALWAYS AFTER REWRITE</text>
  <text x="480" y="476" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">force push main | delete stale remote branches | re-enable branch protection</text>
  <text x="480" y="498" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#1e1f23" fill-opacity="0.45" text-anchor="middle">.gitignore alone only fixes future commits</text>
</svg>
