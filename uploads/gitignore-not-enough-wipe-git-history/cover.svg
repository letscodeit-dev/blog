<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 640" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title-git-history-cover">
  <title id="title-git-history-cover">Git history reset - orphan branch on public content repo</title>
  <defs>
    <marker id="arrow-git-cover" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f54e00"/>
    </marker>
  </defs>
  <rect width="1920" height="640" fill="#ffffff"/>
  <g stroke="#1e1f23" stroke-opacity="0.08" stroke-width="1.2">
    <line x1="0" y1="128" x2="1920" y2="128"/>
    <line x1="0" y1="256" x2="1920" y2="256"/>
    <line x1="0" y1="384" x2="1920" y2="384"/>
    <line x1="0" y1="512" x2="1920" y2="512"/>
  </g>

  <text x="120" y="120" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="1.4" fill="#1e1f23" fill-opacity="0.45">BEFORE - 65 commits on main</text>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.55">
    <circle cx="140" cy="200" r="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <circle cx="200" cy="240" r="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <circle cx="260" cy="280" r="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <circle cx="320" cy="320" r="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <circle cx="380" cy="360" r="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <circle cx="440" cy="400" r="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <line x1="150" y1="205" x2="190" y2="235" stroke="#1e1f23" stroke-opacity="0.25"/>
    <line x1="210" y1="245" x2="250" y2="275" stroke="#1e1f23" stroke-opacity="0.25"/>
    <line x1="270" y1="285" x2="310" y2="315" stroke="#1e1f23" stroke-opacity="0.25"/>
    <line x1="330" y1="325" x2="370" y2="355" stroke="#1e1f23" stroke-opacity="0.25"/>
    <line x1="390" y1="365" x2="430" y2="395" stroke="#1e1f23" stroke-opacity="0.25"/>
    <rect x="460" y="420" width="120" height="36" rx="8" fill="#f54e00" fill-opacity="0.12" stroke="#f54e00" stroke-opacity="0.5"/>
    <text x="472" y="443" font-size="10" font-weight="700" fill="#f54e00">AGENTS.md</text>
    <text x="120" y="480" font-size="10" fill="#1e1f23" fill-opacity="0.4">.ai/ .cursor/ still in old blobs</text>
  </g>

  <path d="M 620 320 L 720 320" stroke="#f54e00" stroke-width="3" fill="none" marker-end="url(#arrow-git-cover)"/>
  <text x="640" y="300" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#f54e00">orphan + force push</text>

  <text x="780" y="120" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" font-weight="700" letter-spacing="1.4" fill="#1e1f23" fill-opacity="0.45">AFTER - 1 root commit</text>
  <rect x="780" y="260" width="520" height="200" rx="16" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.12"/>
  <circle cx="1040" cy="360" r="28" fill="#f54e00" fill-opacity="0.2" stroke="#f54e00" stroke-width="2"/>
  <text x="1040" y="366" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#f54e00" text-anchor="middle">07b80c3</text>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.65">
    <text x="800" y="300">posts/*.md</text>
    <text x="800" y="322">uploads/**</text>
    <text x="800" y="344">README + .gitignore</text>
    <text x="800" y="420" fill="#1e1f23" fill-opacity="0.4">57 files - content only</text>
  </g>

  <rect x="1360" y="200" width="440" height="320" rx="16" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.12"/>
  <text x="1388" y="240" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23">.gitignore</text>
  <text x="1388" y="268" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.5">local only</text>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.6">
    <text x="1388" y="304">AGENTS.md</text>
    <text x="1388" y="328">.ai/</text>
    <text x="1388" y="352">.cursor/</text>
    <text x="1388" y="376">drafts/</text>
    <text x="1388" y="420" fill="#1e1f23" fill-opacity="0.35">never pushed again</text>
  </g>

  <text x="960" y="580" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="#1e1f23" fill-opacity="0.5" text-anchor="middle">.gitignore fixes the future. Orphan branch fixes the past.</text>
</svg>
