  <text x="280" y="344" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">days</text>
  <text x="420" y="344" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">med</text>
  <text x="560" y="344" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#f54e00">high</text>
