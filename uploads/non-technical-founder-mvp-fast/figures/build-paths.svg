  <text x="56" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" font-weight="700" fill="#1e1f23">Sheet + manual</text>
  <text x="280" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">days</text>
  <text x="420" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">low</text>
  <text x="560" y="152" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">low</text>
  <text x="720" y="148" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23">concierge test</text>
  <text x="720" y="168" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#8a8d86">you are the backend</text>
