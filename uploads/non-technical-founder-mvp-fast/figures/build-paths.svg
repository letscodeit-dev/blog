  <text x="280" y="98" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#1e1f23">SPEED</text>
  <text x="420" y="98" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" fill="#1e1f23">FLEX</text>
