  <text x="420" y="440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">high</text>
  <text x="560" y="440" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#f54e00">varies</text>
  <text x="720" y="436" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23">custom flows</text>
  <text x="720" y="456" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#8a8d86">Cursor + template</text>
  <text x="40" y="530" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10" fill="#8a8d86">pick the path that reaches ten user reactions fastest</text>
