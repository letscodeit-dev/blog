  <text x="280" y="248" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">1-2 wk</text>
  <text x="420" y="248" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">med</text>
  <text x="560" y="248" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" fill="#1e1f23">med</text>
  <text x="720" y="244" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#1e1f23">CRUD + landing</text>
  <text x="720" y="264" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" fill="#8a8d86">Bubble, Webflow, Glide</text>
