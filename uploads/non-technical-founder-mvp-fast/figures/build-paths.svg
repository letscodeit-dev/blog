<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title-build-paths">
  <title id="title-build-paths">Build path comparison for non-technical MVP founders</title>
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="40" y="48" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23">FIG. 02 / BUILD PATH TRADEOFFS</text>
