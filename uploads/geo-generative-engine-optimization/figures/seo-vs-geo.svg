<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title-seo-vs-geo">
  <title id="title-seo-vs-geo">Split comparison of classic SEO and generative GEO goals</title>
  <defs>
    <linearGradient id="grad-geo-fig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8f4"/>
      <stop offset="100%" stop-color="#fdfdf8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" rx="12" fill="url(#grad-geo-fig)" stroke="#1e1f23" stroke-opacity="0.1"/>
  <text x="480" y="36" font-family="ui-monospace,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle" letter-spacing="1.2">SEO VS GEO - SAME CONTENT, DIFFERENT WINNER</text>

  <g>
    <rect x="48" y="64" width="400" height="440" rx="12" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
    <rect x="48" y="64" width="400" height="48" rx="12" fill="#1e1f23" fill-opacity="0.08"/>
    <text x="248" y="96" font-family="ui-monospace,Menlo,monospace" font-size="16" font-weight="700" fill="#1e1f23" text-anchor="middle">SEO (classic)</text>
    <g font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#1e1f23">
      <text x="72" y="140" font-weight="700" fill-opacity="0.5">CONSUMER</text>
      <text x="72" y="162" fill-opacity="0.75">Search crawler + rank algo</text>
      <text x="72" y="200" font-weight="700" fill-opacity="0.5">SUCCESS</text>
      <text x="72" y="222" fill-opacity="0.75">Clicks from SERP</text>
      <text x="72" y="260" font-weight="700" fill-opacity="0.5">UNIT OF VALUE</text>
      <text x="72" y="282" fill-opacity="0.75">Page rank for query</text>
      <text x="72" y="320" font-weight="700" fill-opacity="0.5">TYPICAL WINNER</text>
      <text x="72" y="342" fill-opacity="0.75">Backlinks + depth</text>
      <text x="72" y="380" font-weight="700" fill-opacity="0.5">HORIZON</text>
      <text x="72" y="402" fill-opacity="0.75">Months of indexing</text>
    </g>
    <rect x="72" y="424" width="352" height="56" rx="8" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.1"/>
    <text x="88" y="448" font-family="ui-monospace,Menlo,monospace" font-size="10" font-weight="700" fill="#1e1f23" fill-opacity="0.45">GOOGLE SERP</text>
    <text x="88" y="466" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.6">#1 your-site.com/blog/</text>
  </g>

  <g>
    <rect x="512" y="64" width="400" height="440" rx="12" fill="#fdfdf8" stroke="#f54e00" stroke-width="2"/>
    <rect x="512" y="64" width="400" height="48" rx="12" fill="#f54e00" fill-opacity="0.12"/>
    <text x="712" y="96" font-family="ui-monospace,Menlo,monospace" font-size="16" font-weight="700" fill="#f54e00" text-anchor="middle">GEO (generative)</text>
    <g font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#1e1f23">
      <text x="536" y="140" font-weight="700" fill-opacity="0.5">CONSUMER</text>
      <text x="536" y="162" fill-opacity="0.75">LLM + retrieval layer</text>
      <text x="536" y="200" font-weight="700" fill-opacity="0.5">SUCCESS</text>
      <text x="536" y="222" fill-opacity="0.75">Citation inside AI answer</text>
      <text x="536" y="260" font-weight="700" fill-opacity="0.5">UNIT OF VALUE</text>
      <text x="536" y="282" fill-opacity="0.75">Quotable passage / table</text>
      <text x="536" y="320" font-weight="700" fill-opacity="0.5">TYPICAL WINNER</text>
      <text x="536" y="342" fill-opacity="0.75">Answer-first + sources</text>
      <text x="536" y="380" font-weight="700" fill-opacity="0.5">HORIZON</text>
      <text x="536" y="402" fill-opacity="0.75">Next crawl / index refresh</text>
    </g>
    <rect x="536" y="424" width="352" height="56" rx="8" fill="#f54e00" fill-opacity="0.08" stroke="#f54e00" stroke-opacity="0.35"/>
    <text x="552" y="448" font-family="ui-monospace,Menlo,monospace" font-size="10" font-weight="700" fill="#f54e00" fill-opacity="0.8">AI ANSWER</text>
    <text x="552" y="466" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.65">according to letscodeit.dev</text>
  </g>

  <text x="480" y="530" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#1e1f23" fill-opacity="0.5" text-anchor="middle">Complement SEO. Add GEO for chat discovery.</text>
</svg>
