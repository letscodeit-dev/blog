<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title-content-flow">
  <title id="title-content-flow">Content flow from markdown repo to AI answer engines</title>
  <defs>
    <marker id="arr-flow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f54e00"/>
    </marker>
    <linearGradient id="grad-flow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8f4"/>
      <stop offset="100%" stop-color="#fdfdf8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="560" rx="12" fill="url(#grad-flow)" stroke="#1e1f23" stroke-opacity="0.1"/>
  <text x="480" y="36" font-family="ui-monospace,Menlo,monospace" font-size="14" font-weight="700" fill="#1e1f23" text-anchor="middle" letter-spacing="1.2">WHAT ANSWER ENGINES CONSUME</text>

  <g font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="12">
    <rect x="80" y="72" width="200" height="72" rx="10" fill="#1e1f23"/>
    <text x="180" y="104" fill="#fdfdf8" text-anchor="middle" font-size="13">GitHub repo</text>
    <text x="180" y="124" fill="#fdfdf8" fill-opacity="0.65" text-anchor="middle" font-size="10">posts/*.md</text>
    <rect x="380" y="72" width="200" height="72" rx="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <text x="480" y="104" fill="#1e1f23" text-anchor="middle" font-size="13">CDN</text>
    <text x="480" y="124" fill="#1e1f23" fill-opacity="0.55" text-anchor="middle" font-size="9">cdn.letscodeit.dev</text>
    <rect x="680" y="72" width="200" height="72" rx="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.2"/>
    <text x="780" y="104" fill="#1e1f23" text-anchor="middle" font-size="13">Next.js site</text>
    <text x="780" y="124" fill="#1e1f23" fill-opacity="0.55" text-anchor="middle" font-size="9">letscodeit.dev</text>
  </g>

  <g font-family="ui-monospace,Menlo,monospace" font-size="11" font-weight="700">
    <rect x="70" y="200" width="220" height="56" rx="8" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
    <text x="180" y="224" fill="#1e1f23" text-anchor="middle">posts/[slug].md</text>
    <text x="180" y="242" fill="#1e1f23" fill-opacity="0.45" text-anchor="middle" font-size="9">plain Markdown</text>
    <rect x="370" y="200" width="220" height="56" rx="8" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
    <text x="480" y="224" fill="#1e1f23" text-anchor="middle">/blog/[slug]</text>
    <text x="480" y="242" fill="#1e1f23" fill-opacity="0.45" text-anchor="middle" font-size="9">HTML + canonical</text>
    <rect x="670" y="200" width="220" height="56" rx="8" fill="#f54e00" fill-opacity="0.1" stroke="#f54e00" stroke-opacity="0.5"/>
    <text x="780" y="224" fill="#f54e00" text-anchor="middle">/llms.txt</text>
    <text x="780" y="242" fill="#1e1f23" fill-opacity="0.45" text-anchor="middle" font-size="9">title + description</text>
  </g>

  <rect x="200" y="300" width="560" height="88" rx="10" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.12"/>
  <text x="480" y="328" font-family="ui-monospace,Menlo,monospace" font-size="12" font-weight="700" fill="#1e1f23" text-anchor="middle" letter-spacing="1">FRONTMATTER IN EACH .md</text>
  <text x="480" y="352" font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#1e1f23" fill-opacity="0.6" text-anchor="middle">canonical | description | slug | featured | publishedAt</text>
  <text x="480" y="372" font-family="ui-monospace,Menlo,monospace" font-size="10" fill="#f54e00" text-anchor="middle">description feeds llms.txt summary line</text>

  <g font-family="ui-monospace,Menlo,monospace" font-weight="700" font-size="12">
    <rect x="100" y="432" width="160" height="48" rx="10" fill="#1e1f23"/>
    <text x="180" y="462" fill="#fdfdf8" text-anchor="middle">ChatGPT</text>
    <rect x="400" y="432" width="160" height="48" rx="10" fill="#1e1f23"/>
    <text x="480" y="462" fill="#fdfdf8" text-anchor="middle">Perplexity</text>
    <rect x="700" y="432" width="160" height="48" rx="10" fill="#1e1f23"/>
    <text x="780" y="462" fill="#fdfdf8" text-anchor="middle">AI Overviews</text>
  </g>

  <g stroke="#f54e00" stroke-width="2" fill="none" marker-end="url(#arr-flow)">
    <line x1="280" y1="108" x2="380" y2="108"/>
    <line x1="580" y1="108" x2="680" y2="108"/>
    <line x1="180" y1="144" x2="180" y2="200"/>
    <line x1="480" y1="144" x2="480" y2="200"/>
    <line x1="780" y1="144" x2="780" y2="200"/>
    <line x1="480" y1="256" x2="480" y2="300"/>
    <line x1="180" y1="256" x2="180" y2="432"/>
    <line x1="480" y1="388" x2="480" y2="432"/>
    <line x1="780" y1="256" x2="780" y2="432"/>
  </g>

  <text x="480" y="520" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#1e1f23" fill-opacity="0.5" text-anchor="middle">Offer HTML, llms.txt, and plain Markdown - cheap discovery stack</text>
</svg>
