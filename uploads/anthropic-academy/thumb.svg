<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 352 244" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title-academy-thumb">
  <title id="title-academy-thumb">Anthropic Academy — stack of free courses</title>
  <defs>
    <linearGradient id="grad-academy-thumb-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bfc1b7"/>
      <stop offset="100%" stop-color="#eeefe9"/>
    </linearGradient>
    <linearGradient id="grad-academy-thumb-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a5d54"/>
      <stop offset="100%" stop-color="#3a3d34"/>
    </linearGradient>
  </defs>
  <rect width="352" height="244" fill="url(#grad-academy-thumb-light)" class="svg-light-only"/>
  <rect width="352" height="244" fill="url(#grad-academy-thumb-dark)"  class="svg-dark-only"/>

  <!-- dashed learning path -->
  <path d="M 50 210 Q 176 230 302 80" fill="none" stroke="#1e1f23" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="4 4"/>

  <!-- Stack of course cards (bottom → top) -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" letter-spacing="1.4">
    <!-- back card -->
    <g transform="translate(40 116) rotate(-6)">
      <rect width="200" height="100" rx="12" fill="#bfc1b7" stroke="#1e1f23" stroke-opacity="0.15"/>
      <text x="16" y="28" fill="#1e1f23" fill-opacity="0.85">CLAUDE 101</text>
      <text x="16" y="46" font-size="9" fill="#1e1f23" fill-opacity="0.55" letter-spacing="1">INTRO · 45M</text>
    </g>
    <!-- 2 -->
    <g transform="translate(58 96) rotate(-2)">
      <rect width="200" height="100" rx="12" fill="#eeefe9" stroke="#1e1f23" stroke-opacity="0.15"/>
      <text x="16" y="28" fill="#1e1f23">PROMPT ENG.</text>
      <text x="16" y="46" font-size="9" fill="#1e1f23" fill-opacity="0.55" letter-spacing="1">CORE · 1H 20M</text>
    </g>
    <!-- 3 -->
    <g transform="translate(76 76) rotate(2)">
      <rect width="200" height="100" rx="12" fill="#fdfdf8" stroke="#1e1f23" stroke-opacity="0.15"/>
      <text x="16" y="28" fill="#1e1f23">REAL-WORLD</text>
      <text x="16" y="46" font-size="9" fill="#1e1f23" fill-opacity="0.55" letter-spacing="1">PROJECT · 2H</text>
    </g>
    <!-- 4 (dark) -->
    <g transform="translate(94 56) rotate(5)">
      <rect width="200" height="100" rx="12" fill="#1e1f23"/>
      <text x="16" y="28" fill="#fdfdf8">API USAGE</text>
      <text x="16" y="46" font-size="9" fill="#fdfdf8" fill-opacity="0.65" letter-spacing="1">DEV · 1H 50M</text>
    </g>
    <!-- 5 top (orange) -->
    <g transform="translate(112 36) rotate(8)">
      <rect width="200" height="100" rx="12" fill="#f54e00"/>
      <text x="16" y="28" fill="#fdfdf8">MCP DEEP DIVE</text>
      <text x="16" y="46" font-size="9" fill="#fdfdf8" fill-opacity="0.85" letter-spacing="1">ADVANCED · 2H 15M</text>
      <!-- play triangle -->
      <polygon points="156,60 156,84 178,72" fill="#fdfdf8"/>
    </g>
  </g>

  <!-- Caption -->
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11" font-weight="700" letter-spacing="1">
    <text x="20"  y="228" fill="#1e1f23" fill-opacity="0.75">ANTHROPIC ACADEMY · FREE</text>
    <text x="332" y="228" text-anchor="end" fill="#1e1f23" fill-opacity="0.55">v2024</text>
  </g>
</svg>
